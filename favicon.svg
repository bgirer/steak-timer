<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dark background gradient matching the app theme -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f1319" />
    </radialGradient>
    
    <!-- Smooth linear gradient for the flame -->
    <linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="60%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Deep warm red gradient for the steak meat -->
    <linearGradient id="meatGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="50%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#991b1b" />
    </linearGradient>
  </defs>

  <!-- Circular background with fire-amber border -->
  <circle cx="256" cy="256" r="236" fill="url(#bgGrad)" stroke="#f97316" stroke-width="16" />

  <!-- Stylized Steak Shape -->
  <path d="M 160 220 
           C 140 270, 150 330, 190 370 
           C 230 410, 310 400, 350 360 
           C 390 320, 380 250, 340 220 
           C 300 190, 270 200, 240 180 
           C 210 160, 180 170, 160 220 Z" 
        fill="url(#meatGrad)" 
        stroke="#7f1d1d" 
        stroke-width="8" 
        stroke-linejoin="round" />

  <!-- Fat Marbling/Edge (White/Cream) -->
  <path d="M 162 225 
           C 152 250, 156 280, 175 300 
           C 180 290, 178 260, 170 240 
           C 166 230, 164 228, 162 225 Z" 
        fill="#f1f5f9" />
  
  <path d="M 335 355
           C 355 330, 360 300, 350 270
           C 345 280, 340 300, 335 320
           C 332 335, 332 345, 335 355 Z"
        fill="#f1f5f9" />

  <!-- Cross-hatch Grill Marks -->
  <!-- Diagonal 1 -->
  <line x1="190" y1="280" x2="270" y2="360" stroke="#450a0a" stroke-width="12" stroke-linecap="round" />
  <line x1="230" y1="240" x2="320" y2="330" stroke="#450a0a" stroke-width="12" stroke-linecap="round" />
  <line x1="280" y1="220" x2="350" y2="290" stroke="#450a0a" stroke-width="12" stroke-linecap="round" />

  <!-- Diagonal 2 -->
  <line x1="270" y1="240" x2="190" y2="320" stroke="#450a0a" stroke-width="12" stroke-linecap="round" />
  <line x1="320" y1="260" x2="230" y2="350" stroke="#450a0a" stroke-width="12" stroke-linecap="round" />
  <line x1="350" y1="290" x2="280" y2="360" stroke="#450a0a" stroke-width="12" stroke-linecap="round" />

  <!-- Fire Flame Rising from Steak -->
  <path d="M 256 70 
           C 285 130, 320 160, 320 200 
           C 320 230, 290 250, 256 250 
           C 222 250, 192 230, 192 200 
           C 192 160, 227 130, 256 70 Z" 
        fill="url(#flameGrad)" 
        opacity="0.95" />

  <!-- Inner core of the flame -->
  <path d="M 256 120 
           C 270 160, 290 180, 290 205 
           C 290 220, 275 235, 256 235 
           C 237 235, 222 220, 222 205 
           C 222 180, 242 160, 256 120 Z" 
        fill="#fef08a" />
</svg>
